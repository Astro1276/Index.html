<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Notas</title>
    <style>
        :root { --pro-blue: #1f4e78; --pro-green: #375623; --dark: #121212; }
        body { font-family: sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { color: #58a6ff; }
        input, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        button { cursor: pointer; background: var(--pro-blue); color: white; font-weight: bold; }
        .admin-section { background: #2d2d2d; padding: 15px; margin-top: 20px; border-radius: 8px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #444; padding: 10px; }
        th { background: var(--pro-blue); }
        .badge { padding: 5px 10px; border-radius: 15px; font-size: 0.8em; }
        .admin-badge { background: var(--pro-green); }
        .visitor-badge { background: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐺 Notas</h1>
    <div id="login-section">
        <input type="password" id="passInput" placeholder="Introduce Clave">
        <button onclick="login()">Entrar</button>
    </div>

    <div id="user-info" style="margin-top: 10px; display: none;">
        <span id="role-tag" class="badge"></span>
        <p id="welcome-msg"></p>
    </div>

    <div id="admin-panel" class="admin-section">
        <h3>Subir Nueva Nota</h3>
        <input type="text" id="stdName" placeholder="Nombre Estudiante">
        <input type="number" id="stdGrade" placeholder="Nota (0-20)">
        <button onclick="addGrade()" style="background: var(--pro-green);">Guardar Nota</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Estudiante</th>
                <th>Nota</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="grade-table">
            </tbody>
    </table>
</div>

<script>
    let isAdmin = false;

    // 1. Lógica de Acceso
    function login() {
        const pass = document.getElementById('passInput').value;
        const loginSection = document.getElementById('login-section');
        const userInfo = document.getElementById('user-info');
        const roleTag = document.getElementById('role-tag');
        const welcomeMsg = document.getElementById('welcome-msg');

        if (pass === "1276") {
            isAdmin = true;
            document.getElementById('admin-panel').style.display = "block";
            roleTag.innerText = "ADMIN";
            roleTag.className = "badge admin-badge";
            welcomeMsg.innerText = "Bienvenido, Astro1276. Tienes permisos de edición.";
        } else {
            isAdmin = false;
            roleTag.innerText = "VISITANTE";
            roleTag.className = "badge visitor-badge";
            welcomeMsg.innerText = "Perfil de solo lectura.";
        }

        loginSection.style.display = "none";
        userInfo.style.display = "block";
        renderTable();
    }

    // 2. Cargar datos de LocalStorage
    function getGrades() {
        const data = localStorage.getItem('lobo_grades');
        return data ? JSON.parse(data) : [];
    }

    // 3. Añadir Nota (Solo Admin)
    function addGrade() {
        const name = document.getElementById('stdName').value;
        const grade = document.getElementById('stdGrade').value;

        if (name && grade) {
            const grades = getGrades();
            grades.push({ name, grade: parseFloat(grade) });
            localStorage.setItem('lobo_grades', JSON.stringify(grades));
            
            // Limpiar inputs
            document.getElementById('stdName').value = "";
            document.getElementById('stdGrade').value = "";
            renderTable();
        } else {
            alert("Llena todos los campos, Profe.");
        }
    }

    // 4. Dibujar la tabla
    function renderTable() {
        const grades = getGrades();
        const tableBody = document.getElementById('grade-table');
        tableBody.innerHTML = "";

        grades.forEach(item => {
            const status = item.grade >= 10 ? "✅ Aprobado" : "❌ Reprobado";
            tableBody.innerHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>${item.grade}</td>
                    <td>${status}</td>
                </tr>
            `;
        });
    }

    // Cargar tabla al inicio si ya hay datos
    renderTable();
</script>

</body>
</html>
