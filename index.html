<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Notas</title>
    <style>
        :root { --pro-blue: #1f4e78; --pro-green: #375623; --dark: #121212; --danger: #cc0000; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #58a6ff; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 0.9em; margin-bottom: 20px; }
        input, button { padding: 12px; margin: 5px; border-radius: 6px; border: none; outline: none; font-size: 1em; }
        input { background: #333; color: white; width: calc(100% - 30px); max-width: 200px; }
        button { cursor: pointer; background: var(--pro-blue); color: white; font-weight: bold; transition: 0.3s; }
        button:hover { filter: brightness(1.2); }
        
        .btn-logout { background: #555; font-size: 0.8em; padding: 8px 15px; margin-top: 15px; display: none; }
        .btn-delete { background: var(--danger); font-size: 0.8em; padding: 5px 10px; margin: 0; }
        
        .admin-section { background: #252525; padding: 20px; margin-top: 20px; border-radius: 8px; display: none; border-left: 4px solid var(--pro-green); }
        .student-section { background: #252525; padding: 20px; margin-top: 20px; border-radius: 8px; display: none; border-left: 4px solid var(--pro-blue); }
        
        /* Leaderboard / Top */
        .top-board { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-top: 20px; max-width: 300px; margin-left: auto; margin-right: auto; }
        .top-board h3 { color: #ffd700; margin-top: 0; font-size: 1.2em; }
        .top-list { list-style: none; padding: 0; margin: 0; }
        .top-list li { background: #222; margin: 5px 0; padding: 8px; border-radius: 5px; color: #aaa; font-weight: bold; }
        .top-list li span { color: white; }

        /* Stats Dashboard */
        .stats-grid { display: flex; justify-content: center; gap: 20px; margin: 15px 0; }
        .stat-box { background: #333; padding: 15px 25px; border-radius: 8px; min-width: 120px; }
        .stat-box h2 { margin: 0; font-size: 2em; color: #58a6ff; }
        .stat-box p { margin: 5px 0 0 0; color: #aaa; font-size: 0.9em; text-transform: uppercase; }
        
        .status-aprobado { color: #4caf50 !important; }
        .status-reprobado { color: #f44336 !important; }
        .inspirational-msg { font-style: italic; color: #ffeb3b; margin-bottom: 20px; font-size: 1.1em; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #444; padding: 12px; text-align: center; }
        th { background: #2a2a2a; color: #aaa; text-transform: uppercase; font-size: 0.8em; }
    </style>
</head>
<body onload="initApp()">

<div class="container">
    <h1>🐺 Notas</h1>
    <p class="subtitle">Portal del Estudiante & Admin</p>

    <div id="login-section">
        <p>Ingresa tu código de acceso:</p>
        <input type="password" id="passInput" placeholder="Clave">
        <button onclick="login()">Ingresar</button>

        <div class="top-board" id="top-board-container">
            <h3>🏆 Top Users (Mejores Promedios)</h3>
            <ul class="top-list" id="top-students-list">
                </ul>
        </div>
    </div>

    <div id="admin-panel" class="admin-section">
        <h3 style="color: var(--pro-green);">Panel de Control (Admin)</h3>
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;">
            <input type="text" id="stdCode" placeholder="Código (Ej: 0000)">
            <input type="text" id="stdName" placeholder="Nombre (Ej: Astro)">
            <input type="number" id="stdGrade" placeholder="Nota (0-20)" min="0" max="20">
            <button onclick="addGrade()" style="background: var(--pro-green);">Añadir Nota</button>
        </div>
        
        <h4 style="margin-top: 30px; text-align: left;">Vista Global de Estudiantes</h4>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Notas</th>
                        <th>Promedio</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="admin-table"></tbody>
            </table>
        </div>
    </div>

    <div id="student-panel" class="student-section">
        <h2 id="st-welcome">Bienvenido</h2>
        <p class="inspirational-msg" id="st-message"></p>
        
        <div class="stats-grid">
            <div class="stat-box">
                <h2 id="st-average">0.0</h2>
                <p>Promedio Final</p>
            </div>
            <div class="stat-box">
                <h2 id="st-status">-</h2>
                <p>Estado</p>
            </div>
        </div>

        <h4 style="text-align: left;">Historial de Notas</h4>
        <table>
            <thead>
                <tr>
                    <th>Evaluación</th>
                    <th>Calificación</th>
                </tr>
            </thead>
            <tbody id="student-grades"></tbody>
        </table>
    </div>

    <button class="btn-logout" id="btnLogout" onclick="logout()">Cerrar Sesión</button>
</div>

<script>
    // Inicializa la app cargando el Top 3
    function initApp() {
        renderTopBoard();
    }

    function getDB() {
        const data = localStorage.getItem('lobo_db');
        return data ? JSON.parse(data) : {};
    }

    function saveDB(db) {
        localStorage.setItem('lobo_db', JSON.stringify(db));
    }

    function calculateAverage(gradesArray) {
        if (!gradesArray || gradesArray.length === 0) return 0;
        const sum = gradesArray.reduce((a, b) => a + b, 0);
        return parseFloat((sum / gradesArray.length).toFixed(1));
    }

    // Muestra el Top 3 de estudiantes en la pantalla de inicio
    function renderTopBoard() {
        const db = getDB();
        const listEl = document.getElementById('top-students-list');
        listEl.innerHTML = "";

        let studentsArray = [];
        for (const code in db) {
            const avg = calculateAverage(db[code].grades);
            if (db[code].grades.length > 0) {
                studentsArray.push({ code: code, avg: avg });
            }
        }

        // Ordenar de mayor a menor promedio
        studentsArray.sort((a, b) => b.avg - a.avg);

        // Tomar solo los 3 mejores
        const top3 = studentsArray.slice(0, 3);

        if (top3.length === 0) {
            listEl.innerHTML = "<li>Aún no hay notas registradas.</li>";
            return;
        }

        let medallas = ["🥇", "🥈", "🥉"];
        top3.forEach((std, index) => {
            listEl.innerHTML += `<li>${medallas[index]} ID: <span>${std.code}</span> (Prom: ${std.avg})</li>`;
        });
    }

    function login() {
        const pass = document.getElementById('passInput').value;
        if (!pass) return;

        document.getElementById('login-section').style.display = "none";
        document.getElementById('btnLogout').style.display = "inline-block";

        if (pass === "1276") {
            document.getElementById('admin-panel').style.display = "block";
            renderAdminView();
        } else {
            const db = getDB();
            if (db[pass]) {
                document.getElementById('student-panel').style.display = "block";
                renderStudentView(pass, db[pass]);
            } else {
                alert("Código no encontrado. ¿Hiciste la tarea, bro?");
                logout();
            }
        }
    }

    function addGrade() {
        const code = document.getElementById('stdCode').value.trim();
        const name = document.getElementById('stdName').value.trim();
        const gradeStr = document.getElementById('stdGrade').value;
        const grade = parseFloat(gradeStr);

        // VALIDACIÓN: No mayor a 20 ni menor a 0
        if (!code || !name || isNaN(grade)) {
            alert("Profe, llena todos los campos correctamente.");
            return;
        }
        if (grade < 0 || grade > 20) {
            alert("❌ Error: La nota debe estar entre 0 y 20.");
            return;
        }

        const db = getDB();
        
        if (!db[code]) {
            db[code] = { name: name, grades: [] };
        } else {
            db[code].name = name; 
        }

        db[code].grades.push(grade);
        saveDB(db);
        
        document.getElementById('stdGrade').value = "";
        renderAdminView(); 
    }

    // BOTÓN DE PÁNICO: Borrar la última nota de un alumno
    function deleteLastGrade(code) {
        if (confirm(`¿Seguro que quieres borrar la ÚLTIMA nota del estudiante ${code}?`)) {
            const db = getDB();
            if (db[code] && db[code].grades.length > 0) {
                db[code].grades.pop(); // Elimina el último elemento del array
                saveDB(db);
                renderAdminView(); // Recarga la tabla
            }
        }
    }

    function renderAdminView() {
        const db = getDB();
        const tbody = document.getElementById('admin-table');
        tbody.innerHTML = "";

        for (const code in db) {
            const student = db[code];
            const avg = calculateAverage(student.grades);
            const status = avg >= 10 ? "✅ Aprobado" : "❌ Reprobado";
            const colorClass = avg >= 10 ? "status-aprobado" : "status-reprobado";

            // Si no tiene notas, no mostramos el botón de borrar
            const deleteBtn = student.grades.length > 0 
                ? `<button class="btn-delete" onclick="deleteLastGrade('${code}')">Deshacer</button>` 
                : `-`;

            tbody.innerHTML += `
                <tr>
                    <td><strong>${code}</strong></td>
                    <td>${student.name}</td>
                    <td>${student.grades.join(" | ")}</td>
                    <td><strong>${avg}</strong></td>
                    <td class="${colorClass}">${status}</td>
                    <td>${deleteBtn}</td>
                </tr>
            `;
        }
    }

    function renderStudentView(code, studentData) {
        document.getElementById('st-welcome').innerText = `Hola, ${studentData.name}`;
        
        const avg = calculateAverage(studentData.grades);
        const avgEl = document.getElementById('st-average');
        const statusEl = document.getElementById('st-status');
        const msgEl = document.getElementById('st-message');
        
        avgEl.innerText = avg;
        
        // MENSAJES DE INSPIRACIÓN según la nota
        if (studentData.grades.length === 0) {
            msgEl.innerText = "Aún no tienes notas. ¡Prepárate para la primera!";
            msgEl.style.color = "#aaa";
        } else if (avg >= 18) {
            msgEl.innerText = "🔥 ¡Nivel Dios! Eres de la élite de Lobo Academy. Sigue así.";
            msgEl.style.color = "#ffeb3b"; // Amarillo
        } else if (avg >= 14) {
            msgEl.innerText = "🚀 ¡Vas excelente! Un poco más de esfuerzo y llegas al top.";
            msgEl.style.color = "#4caf50"; // Verde
        } else if (avg >= 10) {
            msgEl.innerText = "⚠️ Aprobado, pero al límite. Un programador Senior no se conforma con esto.";
            msgEl.style.color = "#ff9800"; // Naranja
        } else {
            msgEl.innerText = "💀 Un bug en la matrix. Estás reprobando, ¡toca estudiar el doble!";
            msgEl.style.color = "#f44336"; // Rojo
        }

        if (avg >= 10) {
            statusEl.innerText = "APROBADO";
            statusEl.className = "status-aprobado";
            avgEl.className = "status-aprobado";
        } else {
            statusEl.innerText = "REPROBADO";
            statusEl.className = "status-reprobado";
            avgEl.className = "status-reprobado";
        }

        const tbody = document.getElementById('student-grades');
        tbody.innerHTML = "";
        
        studentData.grades.forEach((nota, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>Evaluación ${index + 1}</td>
                    <td><strong>${nota}</strong></td>
                </tr>
            `;
        });
    }

    function logout() {
        document.getElementById('passInput').value = "";
        document.getElementById('login-section').style.display = "block";
        document.getElementById('admin-panel').style.display = "none";
        document.getElementById('student-panel').style.display = "none";
        document.getElementById('btnLogout').style.display = "none";
        renderTopBoard(); // Actualiza el top al salir por si hubo cambios
    }
</script>

</body>
</html>
